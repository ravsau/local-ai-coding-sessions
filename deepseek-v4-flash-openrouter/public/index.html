<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Title & Thumbnail Generator</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header>
      <h1>🎬 Title & Thumbnail Generator</h1>
      <p class="subtitle">
        Enter a video idea &mdash; get 9 ranked titles with scores, then
        generate a thumbnail for any of them. Powered by
        <strong>Google Gemini</strong>.
      </p>
    </header>

    <!-- Input -->
    <section class="input-section">
      <label for="idea-input">What's your video about?</label>
      <div class="input-row">
        <textarea
          id="idea-input"
          placeholder="e.g. I built a ChatGPT-powered robot that makes coffee..."
          rows="3"
        ></textarea>
        <button id="generate-btn" class="btn primary">
          <span class="btn-text">Generate Titles</span>
          <span class="spinner hidden"></span>
        </button>
      </div>
      <p id="error-msg" class="error hidden"></p>
    </section>

    <!-- Results: 9 title cards -->
    <section id="results" class="results hidden">
      <h2>Ranked Titles</h2>
      <div id="title-grid" class="title-grid"></div>
    </section>

    <!-- Thumbnail modal -->
    <div id="thumb-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <button class="modal-close" id="thumb-close">&times;</button>
        <h3 id="thumb-title-display"></h3>
        <div class="thumb-wrapper">
          <img id="thumb-img" src="" alt="Generated thumbnail" />
          <div id="thumb-spinner" class="spinner large"></div>
        </div>
        <p class="thumb-hint">Thumbnail generated by Gemini &mdash; may take a moment.</p>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
